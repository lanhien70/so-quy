<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Sổ Quỹ - Thu Chi Cá Nhân</title>
<meta name="description" content="Ghi chép thu chi cá nhân hằng tháng, nhập nhanh hoặc nhập hàng loạt từ file sao kê ngân hàng">
<meta name="theme-color" content="#0F1626">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sổ Quỹ">
</head>
<body>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0F1626;
    --bg-elev:#151F35;
    --bg-card:#1B2740;
    --line: rgba(212,168,87,0.16);
    --line-strong: rgba(212,168,87,0.38);
    --gold:#D4A857;
    --gold-soft: rgba(212,168,87,0.13);
    --income:#4FAE8E;
    --income-soft: rgba(79,174,142,0.14);
    --expense:#D1495B;
    --expense-soft: rgba(209,73,91,0.14);
    --text:#EEEAE0;
    --text-muted:#8B93AA;
    --text-dim:#5C6580;
    --radius:16px;
    --font-display:'Be Vietnam Pro',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-display);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  #app{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:
      radial-gradient(1200px 300px at 50% -80px, rgba(212,168,87,0.10), transparent),
      var(--bg);
    position:relative;
    padding-bottom:110px;
  }

  /* ---------- Header ---------- */
  .topbar{
    padding:20px 18px 8px;
  }
  .brand{
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand-title{
    font-weight:800; font-size:19px; letter-spacing:0.06em;
    text-transform:uppercase;
  }
  .brand-title span{color:var(--gold);}
  .brand-sub{
    font-size:11px; color:var(--text-dim); letter-spacing:0.08em; margin-top:2px;
    text-transform:uppercase;
  }

  .month-nav{
    display:flex; align-items:center; justify-content:center; gap:14px;
    margin:18px 0 6px;
  }
  .month-btn{
    width:34px;height:34px; border-radius:50%;
    border:1px solid var(--line-strong); background:var(--bg-elev);
    color:var(--gold); font-size:16px; display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .month-btn:active{ background:var(--gold-soft); }
  .month-label{
    font-weight:700; font-size:15px; min-width:130px; text-align:center;
    letter-spacing:0.02em;
  }

  /* ---------- Stamp balance ---------- */
  .stamp-wrap{
    display:flex; justify-content:center; margin:14px 0 10px;
  }
  .stamp{
    width:172px;height:172px; border-radius:50%;
    border:3px double var(--gold);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transform:rotate(-6deg);
    background: radial-gradient(circle at 50% 40%, rgba(212,168,87,0.08), transparent 70%);
    position:relative;
  }
  .stamp::before{
    content:'';
    position:absolute; inset:10px;
    border:1px dashed var(--line-strong);
    border-radius:50%;
  }
  .stamp-label{
    font-size:9.5px; letter-spacing:0.18em; color:var(--gold); text-transform:uppercase;
    font-weight:700;
  }
  .stamp-amount{
    font-family:var(--font-mono); font-weight:700; font-size:21px;
    margin:5px 0 2px; letter-spacing:-0.01em;
  }
  .stamp-amount.neg{ color:var(--expense); }
  .stamp-amount.pos{ color:var(--income); }
  .stamp-foot{
    font-size:8.5px; color:var(--text-dim); letter-spacing:0.14em; text-transform:uppercase;
  }

  /* ---------- Chips ---------- */
  .totals{
    display:flex; gap:10px; padding:0 18px; margin:14px 0 18px;
  }
  .chip{
    flex:1; border-radius:12px; padding:10px 12px;
    border:1px solid var(--line);
  }
  .chip.thu{ background:var(--income-soft); }
  .chip.chi{ background:var(--expense-soft); }
  .chip-label{ font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); }
  .chip-val{ font-family:var(--font-mono); font-weight:700; font-size:15px; margin-top:3px; }
  .chip.thu .chip-val{ color:var(--income); }
  .chip.chi .chip-val{ color:var(--expense); }

  /* ---------- Actions ---------- */
  .actions{
    display:flex; gap:10px; padding:0 18px; margin-bottom:10px;
  }
  .btn{
    border:none; border-radius:12px; padding:13px 10px; font-family:var(--font-display);
    font-weight:700; font-size:14px; cursor:pointer; flex:1;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-thu{ background:var(--income); color:#08251C; }
  .btn-chi{ background:var(--expense); color:#2A0A0F; }
  .btn:active{ filter:brightness(0.92); }

  .import-row{ padding:0 18px; margin-bottom:6px; }
  .btn-import{
    width:100%; background:transparent; border:1px dashed var(--line-strong);
    color:var(--gold); border-radius:12px; padding:12px; font-family:var(--font-display);
    font-weight:600; font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-import:active{ background:var(--gold-soft); }

  /* ---------- Category breakdown ---------- */
  .breakdown{
    margin:20px 18px 6px; padding:14px 14px 12px;
    background:var(--bg-card); border-radius:var(--radius); border:1px solid var(--line);
  }
  .breakdown-title{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted);
    margin-bottom:10px; font-weight:700;
  }
  .bd-bar{ display:flex; height:8px; border-radius:6px; overflow:hidden; background:var(--bg-elev); margin-bottom:10px; }
  .bd-seg{ height:100%; }
  .bd-list{ display:flex; flex-direction:column; gap:7px; }
  .bd-item{ display:flex; align-items:center; font-size:12.5px; color:var(--text-muted); }
  .bd-dot{ width:8px;height:8px;border-radius:50%; margin-right:8px; flex-shrink:0; }
  .bd-name{ flex:1; }
  .bd-pct{ font-family:var(--font-mono); color:var(--text); font-weight:600; margin-right:8px; }
  .bd-amt{ font-family:var(--font-mono); font-size:11.5px; }

  /* ---------- Ledger list ---------- */
  .ledger{ margin:22px 18px 0; }
  .day-group{ margin-bottom:4px; }
  .day-label{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim);
    padding:14px 2px 6px; font-weight:700;
  }
  .tx-row{
    display:flex; align-items:center; padding:11px 2px;
    border-bottom:1px dashed var(--line);
    cursor:pointer;
  }
  .tx-row:active{ background:var(--gold-soft); }
  .tx-dot{ width:7px;height:7px;border-radius:50%; margin-right:11px; flex-shrink:0; }
  .tx-mid{ flex:1; min-width:0; }
  .tx-cat{ font-size:13.5px; font-weight:600; }
  .tx-note{ font-size:11.5px; color:var(--text-dim); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tx-amt{ font-family:var(--font-mono); font-weight:700; font-size:14px; white-space:nowrap; margin-left:8px; }
  .tx-amt.thu{ color:var(--income); }
  .tx-amt.chi{ color:var(--expense); }
  .tx-time{ font-size:10px; color:var(--text-dim); margin-left:8px; font-family:var(--font-mono); min-width:34px; text-align:right;}

  .empty{
    text-align:center; padding:50px 30px; color:var(--text-dim);
  }
  .empty-title{ font-weight:700; color:var(--text-muted); margin-bottom:6px; font-size:14px;}
  .empty-sub{ font-size:12.5px; line-height:1.6; }

  /* ---------- Sheets / modals ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(5,8,16,0.6);
    display:none; align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.show{ display:flex; }
  .sheet{
    width:100%; max-width:460px; background:var(--bg-elev);
    border-radius:20px 20px 0 0; padding:18px 18px 26px;
    border-top:1px solid var(--line-strong);
    max-height:88vh; overflow-y:auto;
    animation:slideup 0.22s ease-out;
  }
  @keyframes slideup{ from{ transform:translateY(24px); opacity:0.4;} to{ transform:translateY(0); opacity:1;} }
  .sheet-handle{ width:36px;height:4px;border-radius:2px; background:var(--line-strong); margin:0 auto 16px; }
  .sheet-title{ font-weight:800; font-size:16px; margin-bottom:16px; letter-spacing:0.01em; }

  .field{ margin-bottom:14px; }
  .field-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:6px; font-weight:700; }
  .amount-input{
    width:100%; background:var(--bg-card); border:1px solid var(--line-strong); border-radius:12px;
    padding:14px; font-family:var(--font-mono); font-size:22px; font-weight:700; color:var(--text);
    text-align:right;
  }
  .amount-input:focus{ outline:none; border-color:var(--gold); }
  .text-input, .select-input{
    width:100%; background:var(--bg-card); border:1px solid var(--line); border-radius:10px;
    padding:11px 12px; font-family:var(--font-display); font-size:13.5px; color:var(--text);
  }
  .text-input:focus, .select-input:focus{ outline:none; border-color:var(--gold); }

  .type-toggle{ display:flex; gap:8px; margin-bottom:16px; }
  .type-toggle button{
    flex:1; padding:11px; border-radius:10px; border:1px solid var(--line); background:var(--bg-card);
    color:var(--text-muted); font-family:var(--font-display); font-weight:700; font-size:13px; cursor:pointer;
  }
  .type-toggle button.active.thu{ background:var(--income-soft); border-color:var(--income); color:var(--income); }
  .type-toggle button.active.chi{ background:var(--expense-soft); border-color:var(--expense); color:var(--expense); }

  .cat-chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .cat-chip{
    padding:8px 13px; border-radius:20px; border:1px solid var(--line); background:var(--bg-card);
    font-size:12.5px; color:var(--text-muted); cursor:pointer;
  }
  .cat-chip.active{ border-color:var(--gold); color:var(--gold); background:var(--gold-soft); font-weight:700; }

  .sheet-actions{ display:flex; gap:10px; margin-top:6px; }
  .btn-primary{
    flex:1; background:var(--gold); color:#241A05; border:none; border-radius:12px; padding:13px;
    font-family:var(--font-display); font-weight:800; font-size:14px; cursor:pointer;
  }
  .btn-ghost{
    flex:1; background:transparent; color:var(--text-muted); border:1px solid var(--line); border-radius:12px; padding:13px;
    font-family:var(--font-display); font-weight:700; font-size:14px; cursor:pointer;
  }
  .btn-danger{
    background:transparent; color:var(--expense); border:1px solid var(--expense); border-radius:12px; padding:13px;
    font-family:var(--font-display); font-weight:700; font-size:14px; cursor:pointer; width:100%; margin-top:8px;
  }

  /* import wizard */
  .step-label{ font-size:12px; color:var(--gold); font-weight:700; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:10px; }
  .drop{
    border:1.5px dashed var(--line-strong); border-radius:14px; padding:30px 16px; text-align:center;
    color:var(--text-muted); font-size:13px; cursor:pointer; margin-bottom:6px;
  }
  .drop:active{ background:var(--gold-soft); }
  .map-row{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .map-col-name{ flex:1; font-size:12.5px; color:var(--text); font-family:var(--font-mono); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .map-select{ width:150px; flex-shrink:0; }
  .preview-note{ font-size:12px; color:var(--text-muted); line-height:1.6; margin-bottom:12px; }
  .preview-box{ max-height:220px; overflow-y:auto; border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin-bottom:14px; }
  .preview-row{ display:flex; justify-content:space-between; font-size:12px; padding:6px 0; border-bottom:1px dashed var(--line); gap:8px; }
  .preview-row:last-child{ border-bottom:none; }
  .preview-desc{ color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .preview-amt{ font-family:var(--font-mono); font-weight:600; flex-shrink:0; }
  .badge-skip{ font-size:10px; color:var(--text-dim); }

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--bg-card); border:1px solid var(--gold); color:var(--text);
    padding:10px 18px; border-radius:20px; font-size:12.5px; z-index:99;
    opacity:0; transition:opacity 0.25s; pointer-events:none;
  }
  .toast.show{ opacity:1; }

  .loading-screen{
    display:flex; align-items:center; justify-content:center; min-height:100vh; color:var(--text-dim); font-size:13px;
  }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>

<div id="app"><div class="loading-screen">Đang mở sổ quỹ…</div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>

<script>
(function(){
  const SYNC_CODE = "t9d85-3r39r-vgmew-8begz";
  const firebaseConfig = {
    apiKey: "AIzaSyCzZFt09qkrBIG9pS8i-UyyVEyh5Swr2ME",
    authDomain: "so-quy-4e942.firebaseapp.com",
    projectId: "so-quy-4e942",
    storageBucket: "so-quy-4e942.firebasestorage.app",
    messagingSenderId: "844668189212",
    appId: "1:844668189212:web:18ed5e647fec7c7c163dd9"
  };
  let transactions = [];
  let currentDate = new Date();
  let currentMonth = currentDate.getMonth();
  let currentYear = currentDate.getFullYear();
  let quickType = "chi";
  let editingId = null;
  let importRows = []; // parsed rows pending confirm
  let importHeaders = [];
  let importMapping = {}; // colIndex -> role

  const CHI_CATS = ["Ăn uống","Đi lại","Nhà ở","Điện nước","Mua sắm","Sức khỏe","Giải trí","Khác"];
  const THU_CATS = ["Lương","Thưởng","Bán hàng","Khác"];
  const PALETTE = ["#D4A857","#6C8EBF","#9B7EDE","#C98A3D","#4FAE8E","#7A8CA3","#D1495B","#5FB0C7"];

  function catColor(cat){
    const all = [...CHI_CATS, ...THU_CATS];
    let idx = all.indexOf(cat);
    if(idx === -1) idx = cat.length;
    return PALETTE[idx % PALETTE.length];
  }

  function fmt(n){
    return Math.round(n).toLocaleString('vi-VN');
  }
  function uid(){
    return 'tx_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  }
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }
  function todayISO(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  let docRef = null;
  let syncState = 'connecting'; // connecting | synced | offline | error
  let firstSnapshot = true;

  function setSyncState(s){
    syncState = s;
    const el = document.getElementById('sync-dot');
    if(el) el.outerHTML = syncDotHtml();
  }
  function syncDotHtml(){
    const map = {
      connecting: ['#8B93AA','Đang kết nối…'],
      synced: ['#4FAE8E','Đã đồng bộ'],
      offline: ['#D4A857','Ngoại tuyến — sẽ tự đồng bộ khi có mạng'],
      error: ['#D1495B','Lỗi đồng bộ']
    };
    const [color,label] = map[syncState] || map.connecting;
    return `<span id="sync-dot" title="${label}" style="display:inline-flex;align-items:center;gap:4px;font-size:9.5px;color:${color};letter-spacing:0.04em;">
      <span style="width:6px;height:6px;border-radius:50%;background:${color};display:inline-block;"></span>${label}
    </span>`;
  }

  function initSync(){
    try{
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      db.enablePersistence({ synchronizeTabs:true }).catch(()=>{});
      docRef = db.collection('soquy').doc(SYNC_CODE);
      docRef.onSnapshot((doc)=>{
        const data = doc.exists ? doc.data() : null;
        transactions = (data && Array.isArray(data.transactions)) ? data.transactions : [];
        setSyncState(doc.metadata.fromCache ? 'offline' : 'synced');
        firstSnapshot = false;
        render();
      }, ()=>{
        setSyncState('error');
        if(firstSnapshot){ transactions = []; firstSnapshot=false; render(); }
      });
    }catch(e){
      setSyncState('error');
      transactions = [];
      render();
    }
  }

  async function saveData(){
    if(!docRef){ showToast("Chưa kết nối đồng bộ"); return; }
    try{
      await docRef.set({ transactions, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    }catch(e){
      showToast("Chưa lưu lên mây được, sẽ tự thử lại khi có mạng");
    }
  }

  function monthLabel(){
    return "Tháng " + (currentMonth+1) + ", " + currentYear;
  }
  function txInMonth(){
    return transactions.filter(t=>{
      const d = new Date(t.date + 'T00:00:00');
      return d.getMonth()===currentMonth && d.getFullYear()===currentYear;
    });
  }

  function render(){
    const list = txInMonth();
    const thu = list.filter(t=>t.type==='thu').reduce((s,t)=>s+t.amount,0);
    const chi = list.filter(t=>t.type==='chi').reduce((s,t)=>s+t.amount,0);
    const balance = thu - chi;

    // category breakdown (chi only)
    const catMap = {};
    list.filter(t=>t.type==='chi').forEach(t=>{
      catMap[t.category] = (catMap[t.category]||0) + t.amount;
    });
    const catEntries = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
    const catTotal = catEntries.reduce((s,[,v])=>s+v,0);

    let breakdownHtml = '';
    if(catEntries.length){
      const segs = catEntries.map(([cat,val])=>{
        const pct = catTotal ? (val/catTotal*100) : 0;
        return `<div class="bd-seg" style="width:${pct}%;background:${catColor(cat)}"></div>`;
      }).join('');
      const items = catEntries.map(([cat,val])=>{
        const pct = catTotal ? Math.round(val/catTotal*100) : 0;
        return `<div class="bd-item">
          <div class="bd-dot" style="background:${catColor(cat)}"></div>
          <div class="bd-name">${cat}</div>
          <div class="bd-pct">${pct}%</div>
          <div class="bd-amt">${fmt(val)}đ</div>
        </div>`;
      }).join('');
      breakdownHtml = `<div class="breakdown">
        <div class="breakdown-title">Chi theo hạng mục</div>
        <div class="bd-bar">${segs}</div>
        <div class="bd-list">${items}</div>
      </div>`;
    }

    // ledger grouped by date desc
    const byDate = {};
    list.forEach(t=>{ (byDate[t.date] = byDate[t.date]||[]).push(t); });
    const dates = Object.keys(byDate).sort((a,b)=> b.localeCompare(a));

    let ledgerHtml = '';
    if(!dates.length){
      ledgerHtml = `<div class="empty">
        <div class="empty-title">Sổ tháng này còn trống</div>
        <div class="empty-sub">Bấm "+ Thu" / "+ Chi" để ghi nhanh,<br>hoặc nhập cả loạt từ file sao kê ngân hàng.</div>
      </div>`;
    } else {
      ledgerHtml = dates.map(date=>{
        const d = new Date(date+'T00:00:00');
        const label = d.toLocaleDateString('vi-VN', {weekday:'long', day:'2-digit', month:'2-digit'});
        const rows = byDate[date].sort((a,b)=> (b.time||'')<(a.time||'')?-1:1).map(t=>{
          return `<div class="tx-row" onclick="App.openEdit('${t.id}')">
            <div class="tx-dot" style="background:${catColor(t.category)}"></div>
            <div class="tx-mid">
              <div class="tx-cat">${escapeHtml(t.category)}</div>
              ${t.note ? `<div class="tx-note">${escapeHtml(t.note)}</div>` : ''}
            </div>
            <div class="tx-amt ${t.type}">${t.type==='thu'?'+':'−'}${fmt(t.amount)}đ</div>
          </div>`;
        }).join('');
        return `<div class="day-group"><div class="day-label">${label}</div>${rows}</div>`;
      }).join('');
    }

    document.getElementById('app').innerHTML = `
      <div class="topbar">
        <div class="brand">
          <div>
            <div class="brand-title">Sổ <span>Quỹ</span></div>
            <div class="brand-sub">Thu chi cá nhân · ${syncDotHtml()}</div>
          </div>
        </div>
        <div class="month-nav">
          <div class="month-btn" onclick="App.shiftMonth(-1)">‹</div>
          <div class="month-label">${monthLabel()}</div>
          <div class="month-btn" onclick="App.shiftMonth(1)">›</div>
        </div>
      </div>

      <div class="stamp-wrap">
        <div class="stamp">
          <div class="stamp-label">Số dư tháng</div>
          <div class="stamp-amount ${balance<0?'neg':'pos'}">${balance<0?'−':''}${fmt(Math.abs(balance))}</div>
          <div class="stamp-foot">Đã ghi sổ</div>
        </div>
      </div>

      <div class="totals">
        <div class="chip thu"><div class="chip-label">Thu</div><div class="chip-val">+${fmt(thu)}đ</div></div>
        <div class="chip chi"><div class="chip-label">Chi</div><div class="chip-val">−${fmt(chi)}đ</div></div>
      </div>

      <div class="actions">
        <button class="btn btn-thu" onclick="App.openQuick('thu')">+ Thu</button>
        <button class="btn btn-chi" onclick="App.openQuick('chi')">+ Chi</button>
      </div>
      <div class="import-row">
        <button class="btn-import" onclick="App.openImport()">⇩ Nhập từ file sao kê ngân hàng (CSV)</button>
      </div>

      ${breakdownHtml}

      <div class="ledger">${ledgerHtml}</div>
    `;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Quick add sheet ----------
  function openQuick(type, existing){
    quickType = type;
    editingId = existing ? existing.id : null;
    const cats = quickType==='thu' ? THU_CATS : CHI_CATS;
    const amt = existing ? existing.amount : '';
    const cat = existing ? existing.category : cats[0];
    const note = existing ? (existing.note||'') : '';
    const date = existing ? existing.date : todayISO();

    const catChips = cats.map(c=>`<div class="cat-chip ${c===cat?'active':''}" data-cat="${escapeHtml(c)}" onclick="App.pickCat(this)">${c}</div>`).join('');

    const html = `
      <div class="sheet-handle"></div>
      <div class="sheet-title">${editingId? 'Sửa giao dịch' : 'Ghi nhanh'}</div>
      <div class="type-toggle">
        <button class="${quickType==='thu'?'active thu':''}" onclick="App.switchQuickType('thu')">↓ Khoản Thu</button>
        <button class="${quickType==='chi'?'active chi':''}" onclick="App.switchQuickType('chi')">↑ Khoản Chi</button>
      </div>
      <div class="field">
        <div class="field-label">Số tiền (đ)</div>
        <input type="tel" inputmode="numeric" class="amount-input" id="f-amount" placeholder="0" value="${amt}">
      </div>
      <div class="field">
        <div class="field-label">Hạng mục</div>
        <div class="cat-chips" id="f-cats">${catChips}</div>
      </div>
      <div class="field">
        <div class="field-label">Ghi chú (không bắt buộc)</div>
        <input type="text" class="text-input" id="f-note" placeholder="VD: tiền ăn trưa, lương T7..." value="${escapeHtml(note)}">
      </div>
      <div class="field">
        <div class="field-label">Ngày</div>
        <input type="date" class="text-input" id="f-date" value="${date}">
      </div>
      <div class="sheet-actions">
        <button class="btn-ghost" onclick="App.closeSheet()">Hủy</button>
        <button class="btn-primary" onclick="App.saveQuick()">Lưu</button>
      </div>
      ${editingId ? `<button class="btn-danger" onclick="App.deleteTx('${editingId}')">Xóa giao dịch này</button>` : ''}
    `;
    document.getElementById('sheet-body').innerHTML = html;
    document.getElementById('sheet-body').dataset.selectedCat = cat;
    showOverlay();
  }
  function switchQuickType(type){
    quickType = type;
    const amountEl = document.getElementById('f-amount');
    const noteEl = document.getElementById('f-note');
    const dateEl = document.getElementById('f-date');
    openQuick(type, {
      amount: amountEl ? amountEl.value : '',
      category: (quickType==='thu'?THU_CATS:CHI_CATS)[0],
      note: noteEl ? noteEl.value : '',
      date: dateEl ? dateEl.value : todayISO(),
      id: editingId
    });
    if(!editingId){ /* keep editingId null for new */ }
  }
  function pickCat(el){
    document.querySelectorAll('#f-cats .cat-chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('sheet-body').dataset.selectedCat = el.dataset.cat;
  }
  function saveQuick(){
    const amount = parseInt((document.getElementById('f-amount').value||'0').replace(/[^\d]/g,''), 10);
    if(!amount || amount<=0){ showToast("Nhập số tiền hợp lệ nhé"); return; }
    const category = document.getElementById('sheet-body').dataset.selectedCat || (quickType==='thu'?THU_CATS[0]:CHI_CATS[0]);
    const note = document.getElementById('f-note').value.trim();
    const date = document.getElementById('f-date').value || todayISO();

    if(editingId){
      const t = transactions.find(x=>x.id===editingId);
      if(t){ t.type=quickType; t.amount=amount; t.category=category; t.note=note; t.date=date; }
    } else {
      transactions.push({ id: uid(), type: quickType, amount, category, note, date, time: new Date().toTimeString().slice(0,5), source:'manual' });
    }
    saveData();
    closeSheet();
    render();
    showToast(editingId ? "Đã cập nhật" : "Đã ghi vào sổ");
  }
  function openEdit(id){
    const t = transactions.find(x=>x.id===id);
    if(!t) return;
    openQuick(t.type, t);
  }
  function deleteTx(id){
    transactions = transactions.filter(x=>x.id!==id);
    saveData();
    closeSheet();
    render();
    showToast("Đã xóa giao dịch");
  }

  function shiftMonth(delta){
    currentMonth += delta;
    if(currentMonth<0){ currentMonth=11; currentYear--; }
    if(currentMonth>11){ currentMonth=0; currentYear++; }
    render();
  }

  // ---------- Import wizard ----------
  function openImport(){
    const html = `
      <div class="sheet-handle"></div>
      <div class="sheet-title">Nhập từ file sao kê ngân hàng</div>
      <div class="step-label">Bước 1 · Chọn file</div>
      <div class="preview-note">
        Xuất file CSV/Excel (lưu dạng CSV) sao kê giao dịch từ app ngân hàng của anh, rồi chọn file đó ở đây.
        App sẽ đọc và cho anh xác nhận trước khi ghi vào sổ — không tự động ghi ngay.
      </div>
      <label class="drop">
        📄 Bấm để chọn file .csv
        <input type="file" accept=".csv,.txt" style="display:none" id="f-csv" onchange="App.handleCsv(event)">
      </label>
      <div class="sheet-actions" style="margin-top:16px;">
        <button class="btn-ghost" onclick="App.closeSheet()" style="width:100%">Đóng</button>
      </div>
    `;
    document.getElementById('sheet-body').innerHTML = html;
    showOverlay();
  }

  function detectDelimiter(line){
    const counts = { ',': (line.match(/,/g)||[]).length, ';': (line.match(/;/g)||[]).length, '\t': (line.match(/\t/g)||[]).length };
    return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
  }
  function parseCsvLine(line, delim){
    // simple CSV parser supporting quoted fields
    const out = []; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const c = line[i];
      if(inQ){
        if(c==='"'){ if(line[i+1]==='"'){ cur+='"'; i++; } else { inQ=false; } }
        else cur+=c;
      } else {
        if(c==='"') inQ=true;
        else if(c===delim){ out.push(cur); cur=''; }
        else cur+=c;
      }
    }
    out.push(cur);
    return out.map(s=>s.trim());
  }

  function guessRole(header){
    const h = header.toLowerCase();
    if(/(ngày|ngay|date|thời gian|thoi gian)/.test(h)) return 'date';
    if(/(diễn giải|dien giai|nội dung|noi dung|description|mô tả|mo ta|content)/.test(h)) return 'desc';
    if(/(ghi có|ghi co|credit|tiền vào|tien vao|số tiền vào)/.test(h)) return 'thu';
    if(/(ghi nợ|ghi no|debit|tiền ra|tien ra|số tiền ra)/.test(h)) return 'chi';
    if(/(số tiền|so tien|amount)/.test(h)) return 'amount';
    return 'skip';
  }

  function handleCsv(evt){
    const file = evt.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      let text = e.target.result;
      text = text.replace(/^\uFEFF/, ''); // strip BOM
      const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
      if(lines.length < 2){ showToast("File không có dữ liệu"); return; }
      const delim = detectDelimiter(lines[0]);
      importHeaders = parseCsvLine(lines[0], delim);
      importRows = lines.slice(1).map(l=>parseCsvLine(l, delim));
      importMapping = {};
      importHeaders.forEach((h,i)=>{ importMapping[i] = guessRole(h); });
      renderMappingStep(delim);
    };
    reader.onerror = function(){ showToast("Không đọc được file"); };
    reader.readAsText(file, 'UTF-8');
  }

  function renderMappingStep(){
    const roleOptions = [
      ['skip','Bỏ qua cột này'],
      ['date','Ngày giao dịch'],
      ['desc','Diễn giải / Nội dung'],
      ['thu','Số tiền vào (Thu)'],
      ['chi','Số tiền ra (Chi)'],
      ['amount','Số tiền (kèm dấu +/-)'],
    ];
    const rows = importHeaders.map((h,i)=>{
      const opts = roleOptions.map(([v,label])=>`<option value="${v}" ${importMapping[i]===v?'selected':''}>${label}</option>`).join('');
      return `<div class="map-row">
        <div class="map-col-name">${escapeHtml(h||('Cột '+(i+1)))}</div>
        <select class="select-input map-select" onchange="App.setMapping(${i}, this.value)">${opts}</select>
      </div>`;
    }).join('');

    const html = `
      <div class="sheet-handle"></div>
      <div class="sheet-title">Gán cột dữ liệu</div>
      <div class="step-label">Bước 2 · Cột nào là gì?</div>
      <div class="preview-note">Đã tự đoán sẵn, anh kiểm tra lại rồi bấm Tiếp tục. Lần sau nếu cùng ngân hàng, chỉ cần lặp lại là xong.</div>
      ${rows}
      <div class="sheet-actions" style="margin-top:14px;">
        <button class="btn-ghost" onclick="App.openImport()">Quay lại</button>
        <button class="btn-primary" onclick="App.buildPreview()">Tiếp tục</button>
      </div>
    `;
    document.getElementById('sheet-body').innerHTML = html;
  }
  function setMapping(idx, val){ importMapping[idx] = val; }

  function parseAmount(raw){
    if(raw===undefined || raw===null) return 0;
    let s = String(raw).trim();
    if(!s) return 0;
    let neg = /^-/.test(s) || /^\(.*\)$/.test(s);
    s = s.replace(/[()]/g,'');
    s = s.replace(/[^\d,.\-]/g,'');
    // remove thousands separators, keep last decimal marker only if looks like decimal (rare for VND)
    s = s.replace(/[,.](?=\d{3}(\D|$))/g,'');
    s = s.replace(/[,.]/g,'');
    s = s.replace(/-/g,'');
    const n = parseInt(s,10) || 0;
    return neg ? -n : n;
  }
  function parseDateFlexible(raw){
    if(!raw) return null;
    const s = raw.trim();
    let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
    if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2})$/);
    if(m) return `20${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    return null;
  }

  function buildPreview(){
    const dateIdx = Object.keys(importMapping).find(k=>importMapping[k]==='date');
    const descIdx = Object.keys(importMapping).find(k=>importMapping[k]==='desc');
    const thuIdx = Object.keys(importMapping).find(k=>importMapping[k]==='thu');
    const chiIdx = Object.keys(importMapping).find(k=>importMapping[k]==='chi');
    const amtIdx = Object.keys(importMapping).find(k=>importMapping[k]==='amount');

    if(dateIdx===undefined || (thuIdx===undefined && chiIdx===undefined && amtIdx===undefined)){
      showToast("Cần gán ít nhất cột Ngày và cột Số tiền");
      return;
    }

    const parsed = [];
    let skipped = 0;
    importRows.forEach(row=>{
      const dateRaw = row[dateIdx];
      const date = parseDateFlexible(dateRaw);
      const desc = descIdx!==undefined ? (row[descIdx]||'') : '';
      let type=null, amount=0;
      if(thuIdx!==undefined && row[thuIdx] && parseAmount(row[thuIdx])>0){
        type='thu'; amount=Math.abs(parseAmount(row[thuIdx]));
      } else if(chiIdx!==undefined && row[chiIdx] && parseAmount(row[chiIdx])>0){
        type='chi'; amount=Math.abs(parseAmount(row[chiIdx]));
      } else if(amtIdx!==undefined && row[amtIdx]){
        const v = parseAmount(row[amtIdx]);
        if(v!==0){ type = v>0?'thu':'chi'; amount=Math.abs(v); }
      }
      if(!date || !type || !amount){ skipped++; return; }
      parsed.push({ date, desc, type, amount });
    });

    renderPreviewStep(parsed, skipped, "App.openImport()", "Chọn file khác", "dòng bỏ qua vì thiếu dữ liệu");
  }

  function renderPreviewStep(rawList, skippedCount, backOnclick, backLabel, skippedWord){
    const existingKeys = new Set(transactions.map(t=> t.date+'|'+t.amount+'|'+(t.note||'').toLowerCase()));
    const parsed = rawList.map(p=>{
      const key = p.date+'|'+p.amount+'|'+(p.desc||'').toLowerCase();
      return { ...p, dup: existingKeys.has(key) };
    });
    importRows = parsed;

    const newCount = parsed.filter(p=>!p.dup).length;
    const dupCount = parsed.filter(p=>p.dup).length;

    const rowsHtml = parsed.slice(0,200).map(p=>{
      return `<div class="preview-row">
        <div class="preview-desc">${escapeHtml(p.date)} · ${escapeHtml(p.desc||'(không có mô tả)')} ${p.dup?'<span class=\"badge-skip\">· trùng, sẽ bỏ qua</span>':''}</div>
        <div class="preview-amt" style="color:${p.type==='thu'?'var(--income)':'var(--expense)'}">${p.type==='thu'?'+':'−'}${fmt(p.amount)}đ</div>
      </div>`;
    }).join('');

    const skippedNote = skippedCount ? ` (${skippedCount} ${skippedWord||'mục bỏ qua'})` : '';

    const html = `
      <div class="sheet-handle"></div>
      <div class="sheet-title">Xác nhận nhập liệu</div>
      <div class="step-label">Kiểm tra trước khi lưu</div>
      <div class="preview-note">
        Đọc được <b>${parsed.length}</b> giao dịch hợp lệ${skippedNote}.
        Trong đó <b>${newCount}</b> giao dịch mới sẽ được ghi vào sổ, <b>${dupCount}</b> giao dịch trùng sẽ tự bỏ qua.
        Anh kiểm tra lại số liệu trước khi lưu nhé — nhận diện tự động có thể chưa chính xác 100%.
      </div>
      <div class="preview-box">${rowsHtml || '<div class="preview-row"><div class="preview-desc">Không có dòng hợp lệ</div></div>'}</div>
      <div class="sheet-actions">
        <button class="btn-ghost" onclick="${backOnclick}">${backLabel}</button>
        <button class="btn-primary" onclick="App.confirmImport()">Ghi ${newCount} giao dịch vào sổ</button>
      </div>
    `;
    document.getElementById('sheet-body').innerHTML = html;
  }

  function confirmImport(){
    const toAdd = importRows.filter(p=>!p.dup);
    toAdd.forEach(p=>{
      transactions.push({
        id: uid(), type:p.type, amount:p.amount,
        category: p.type==='thu' ? 'Khác' : 'Khác',
        note: p.desc || '', date: p.date, time:'', source:'import'
      });
    });
    saveData();
    closeSheet();
    render();
    showToast(`Đã nhập ${toAdd.length} giao dịch`);
  }

  // ---------- overlay helpers ----------
  function showOverlay(){ document.getElementById('overlay').classList.add('show'); }
  function closeSheet(){ document.getElementById('overlay').classList.remove('show'); editingId=null; }

  window.App = {
    openQuick, switchQuickType, pickCat, saveQuick, openEdit, deleteTx, closeSheet,
    shiftMonth, openImport, handleCsv, setMapping, buildPreview, confirmImport
  };

  // build overlay shell once
  document.body.insertAdjacentHTML('beforeend', `
    <div class="overlay" id="overlay" onclick="if(event.target===this) App.closeSheet()">
      <div class="sheet" id="sheet-body"></div>
    </div>
  `);

  initSync();
})();
</script>


<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>

</body>
